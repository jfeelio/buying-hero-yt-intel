name: Daily YouTube Intelligence Run

on:
  schedule:
    - cron: '0 10 * * *'   # 6:00 AM ET (UTC-4) every day
  workflow_dispatch:         # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        working-directory: agent
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit and push data
        run: |
          git config user.name "Buying Hero Bot"
          git config user.email "bot@buyinghero.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "Daily intel update $(date -u +%Y-%m-%d)"
          git push
