name: Daily YouTube Intelligence Run

on:
  schedule:
    - cron: '0 10 * * *'   # 6:00 AM ET (UTC-4) every day
  workflow_dispatch:         # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        working-directory: agent
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python main.py

      - name: Commit and push data
        run: |
          git config user.name "Buying Hero Bot"
          git config user.email "bot@buyinghero.com"
          git add docs/data/
          $status = git status --porcelain
          if ($status) { git commit -m "Daily intel update $(Get-Date -Format yyyy-MM-dd)"; git push }
